<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Generate Mobile Receipt (Dummy Form)</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    max-width: 420px;
    margin: 40px auto;
    padding: 0 16px;
    background: #f5f5f7;
    color: #1d1d1f;
  }
  h1 { font-size: 20px; margin-bottom: 4px; }
  p.sub { color: #666; font-size: 13px; margin-top: 0; margin-bottom: 24px; }
  form {
    background: #fff;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-top: 14px;
    margin-bottom: 4px;
  }
  input {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid #d2d2d7;
    border-radius: 8px;
    font-size: 14px;
    box-sizing: border-box;
  }
  button {
    width: 100%;
    margin-top: 20px;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #0071e3;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  button:disabled { background: #a0c4e8; cursor: not-allowed; }
  #endpoint {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid #d2d2d7;
    border-radius: 8px;
    font-size: 13px;
    box-sizing: border-box;
    margin-bottom: 8px;
  }
  #result {
    margin-top: 20px;
    border: 1px solid #d2d2d7;
    border-radius: 12px;
    overflow: hidden;
    background: #fff;
  }
  #result iframe {
    width: 100%;
    height: 500px;
    border: none;
    display: block;
  }
  #status {
    font-size: 13px;
    margin-top: 10px;
    min-height: 18px;
  }
  .error { color: #d70015; }
  .ok { color: #1a7f37; }
</style>
</head>
<body>

<h1>Generate Mobile Receipt</h1>
<p class="sub">Dummy form — posts JSON to <code>/generate-mobile-receipt</code> and renders the returned HTML.</p>

<form id="receiptForm">
  <label for="endpoint">Endpoint URL</label>
  <input id="endpoint" type="text" value="/generate-mobile-receipt">

  <label for="sender">Sender</label>
  <input id="sender" type="text" placeholder="e.g. John Doe" required>

  <label for="receiver">Receiver</label>
  <input id="receiver" type="text" placeholder="e.g. Jane Smith" required>

  <label for="amount">Amount</label>
  <input id="amount" type="number" step="0.01" min="0" placeholder="e.g. 250.00" required>

  <label for="sender_acc">Sender Account</label>
  <input id="sender_acc" type="text" placeholder="e.g. 1234567890">

  <label for="receiver_acc">Receiver Account</label>
  <input id="receiver_acc" type="text" placeholder="e.g. 0987654321">

  <button id="submitBtn" type="submit">Generate Receipt</button>
  <div id="status"></div>
</form>

<div id="result" style="display:none;">
  <iframe id="resultFrame" title="Receipt preview"></iframe>
</div>

<script>
document.getElementById('receiptForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const btn = document.getElementById('submitBtn');
  const statusEl = document.getElementById('status');
  const resultBox = document.getElementById('result');
  const frame = document.getElementById('resultFrame');
  const endpoint = document.getElementById('endpoint').value.trim();

  const payload = {
    sender: document.getElementById('sender').value,
    receiver: document.getElementById('receiver').value,
    amount: document.getElementById('amount').value,
    sender_acc: document.getElementById('sender_acc').value,
    receiver_acc: document.getElementById('receiver_acc').value
  };

  btn.disabled = true;
  statusEl.textContent = 'Sending request...';
  statusEl.className = '';
  resultBox.style.display = 'none';

  try {
    const res = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    const text = await res.text();

    if (!res.ok) {
      statusEl.textContent = `Error ${res.status}: ${text.slice(0, 300)}`;
      statusEl.className = 'error';
    } else {
      statusEl.textContent = 'Receipt generated successfully.';
      statusEl.className = 'ok';
      frame.srcdoc = text;
      resultBox.style.display = 'block';
    }
  } catch (err) {
    statusEl.textContent = 'Request failed: ' + err.message;
    statusEl.className = 'error';
  } finally {
    btn.disabled = false;
  }
});
</script>

</body>
</html>
