<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Generate Mobile Receipt (Dummy Form)</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    max-width: 420px;
    margin: 40px auto;
    padding: 0 16px;
    background: #f5f5f7;
    color: #1d1d1f;
  }
  h1 { font-size: 20px; margin-bottom: 4px; }
  p.sub { color: #666; font-size: 13px; margin-top: 0; margin-bottom: 24px; }
  form {
    background: #fff;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-top: 14px;
    margin-bottom: 4px;
  }
  input {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid #d2d2d7;
    border-radius: 8px;
    font-size: 14px;
    box-sizing: border-box;
  }
  button {
    width: 100%;
    margin-top: 20px;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #0071e3;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover {
    background: #0077ed;
  }
  #demoBtn {
    background: #34c759;
    margin-top: 12px;
  }
  #demoBtn:hover {
    background: #30d158;
  }
  #endpoint {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid #d2d2d7;
    border-radius: 8px;
    font-size: 13px;
    box-sizing: border-box;
    margin-bottom: 8px;
  }
</style>
</head>
<body>

<h1>Generate Mobile Receipt</h1>
<p class="sub">Dummy form — sends GET request to <code>/generate-mobile-receipt</code> and renders the returned HTML.</p>

<form id="receiptForm">
  <label for="endpoint">Endpoint URL</label>
  <input id="endpoint" type="text" value="/generate-mobile-receipt">

  <label for="sender_name">Sender Name</label>
  <input id="sender_name" type="text" placeholder="e.g. John Doe" required>

  <label for="receiver_name">Receiver Name</label>
  <input id="receiver_name" type="text" placeholder="e.g. Jane Smith" required>

  <label for="amount">Amount</label>
  <input id="amount" type="number" step="0.01" min="0" placeholder="e.g. 250.00" required>

  <label for="vat">VAT</label>
  <input id="vat" type="number" step="0.01" min="0" placeholder="e.g. 12.50" value="0">

  <label for="commission">Commission</label>
  <input id="commission" type="number" step="0.01" min="0" placeholder="e.g. 5.00" value="0">

  <label for="sender_account">Sender Account</label>
  <input id="sender_account" type="text" placeholder="e.g. 1234567890">

  <label for="receiver_account">Receiver Account</label>
  <input id="receiver_account" type="text" placeholder="e.g. 0987654321">

  <button id="submitBtn" type="submit">Generate Receipt</button>
  <button id="demoBtn" type="button">🎲 Try Demo (Random Data)</button>
</form>

<script>
// Random data generator
function getRandomName() {
  const firstNames = ['John', 'Jane', 'Mike', 'Sarah', 'David', 'Emma', 'Chris', 'Lisa', 'Tom', 'Anna'];
  const lastNames = ['Smith', 'Johnson', 'Brown', 'Davis', 'Wilson', 'Moore', 'Taylor', 'Anderson', 'Thomas', 'White'];
  return `${firstNames[Math.floor(Math.random() * firstNames.length)]} ${lastNames[Math.floor(Math.random() * lastNames.length)]}`;
}

function getRandomAmount() {
  return (Math.random() * 1000 + 10).toFixed(2);
}

function getRandomAccount() {
  return Math.floor(Math.random() * 9000000000 + 1000000000).toString();
}

function getRandomPercent(max) {
  return (Math.random() * max).toFixed(2);
}

// Demo button handler
document.getElementById('demoBtn').addEventListener('click', () => {
  // Fill form with random data
  document.getElementById('sender_name').value = getRandomName();
  document.getElementById('receiver_name').value = getRandomName();
  const amount = parseFloat(getRandomAmount());
  document.getElementById('amount').value = amount.toFixed(2);
  document.getElementById('vat').value = (amount * 0.05).toFixed(2); // 5% VAT
  document.getElementById('commission').value = (amount * 0.02).toFixed(2); // 2% commission
  document.getElementById('sender_account').value = getRandomAccount();
  document.getElementById('receiver_account').value = getRandomAccount();
  
  // Submit the form
  setTimeout(() => {
    document.getElementById('receiptForm').dispatchEvent(new Event('submit'));
  }, 100);
});

// Form submission handler
document.getElementById('receiptForm').addEventListener('submit', (e) => {
  e.preventDefault();

  const endpoint = document.getElementById('endpoint').value.trim();

  // Build query parameters for GET request
  const params = new URLSearchParams({
    sender_name: document.getElementById('sender_name').value || 'NULL',
    receiver_name: document.getElementById('receiver_name').value || 'NULL',
    amount: document.getElementById('amount').value || '0.0',
    vat: document.getElementById('vat').value || '0.0',
    commission: document.getElementById('commission').value || '0.0',
    sender_account: document.getElementById('sender_account').value || '',
    receiver_account: document.getElementById('receiver_account').value || ''
  });

  // Navigate to the receipt page
  window.location.href = `${endpoint}?${params.toString()}`;
});
</script>

</body>
</html>
