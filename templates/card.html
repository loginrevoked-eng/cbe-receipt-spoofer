<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transaction Receipt</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.65)), #EDEDED;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px 12px;
  }
  .card {
    width: 100%;
    max-width: 340px;
    background: #FFFFFF;
    border-radius: 0;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 120px rgba(0, 0, 0, 0.4);
  }
  .header {
    background: #8BC34A;
    padding: 14px 20px 16px;
    position: relative;
  }
  .header-actions {
    position: absolute;
    top: 18px;
    right: 16px;
    display: flex;
    gap: 14px;
  }
  .header-actions button {
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    color: #FFFFFF;
  }
  .header-actions svg { width: 17px; height: 17px; display: block; }
  .shield {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: rgba(255,255,255,0.28);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .shield svg { width: 18px; height: 18px; color: #FFFFFF; }
  .header-title {
    margin-top: 10px;
    font-size: 20px;
    font-weight: 700;
    color: #FFFFFF;
  }
  .header-subtitle {
    margin-top: 1px;
    font-size: 13px;
    font-weight: 400;
    color: rgba(255,255,255,0.92);
  }
  .body { padding: 20px 20px 22px; }
  .label-small {
    font-size: 12px;
    font-weight: 400;
    color: #9CA3AF;
    margin-bottom: 8px;
  }
  .message {
    font-size: 14.5px;
    line-height: 1.55;
    font-weight: 600;
    color: #1F2937;
  }
  .divider {
    height: 1px;
    background: #EDEDED;
    margin: 20px 0;
  }
  .qr-section {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .qr-box {
    width: 190px;
    height: 190px;
    background: #FFFFFF;
    border: 1px solid #E5E5E5;
    border-radius: 10px;
    padding: 14px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .qr-box img.qr { 
    width: 100%; 
    height: 100%; 
    object-fit: contain; 
  }
  .qr-logo {
    position: absolute;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: #FFFFFF;
    box-shadow: 0 0 0 3px #FFFFFF;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .qr-logo-inner {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: #FFFFFF;
  }
  .qr-logo-inner img { 
    width: 100%; 
    height: 100%; 
    object-fit: cover; 
    border-radius: 50%;
  }

  .view-receipt-btn {
    width: auto;
    min-width: 168px;
    height: 42px;
    padding: 0 22px;
    border-radius: 999px;
    background: #B8860B;
    border: none;
    color: #FFFFFF;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.04em;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 9px;
    cursor: pointer;
    margin: 22px auto 0;
    box-shadow: 0 2px 6px rgba(184,134,11,0.35);
  }
  .view-receipt-btn:hover { background: #A67809; }
  .view-receipt-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
  .footer {
    background: #F2F2F2;
    border-top: 1px solid #EDEDED;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .bank-icon {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    overflow: hidden;
  }
  .bank-icon img { width: 18px; height: 18px; object-fit: contain; transform: scale(2); }
  .bank-name {
    font-size: 13.5px;
    font-weight: 700;
    color: #374151;
  }
  .bank-tagline {
    font-size: 12px;
    font-weight: 400;
    color: #9CA3AF;
    margin-top: 1px;
  }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="header-actions">
      <button aria-label="Share">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3" fill="currentColor"/><circle cx="6" cy="12" r="3" fill="currentColor"/><circle cx="18" cy="19" r="3" fill="currentColor"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      </button>
      <button aria-label="Download">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
      <button aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="shield">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>
    </div>
    <div class="header-title">Thank You!</div>
    <div class="header-subtitle">Success</div>
  </div>

  <div class="body">
    <div class="label-small">Message</div>
    <div class="message">%MESSAGE%</div>
    <div class="divider"></div>
    <div class="qr-section">
      <div class="qr-box">
        <img class="qr" src="%QR_CODE_IMG_SRC%" alt="QR code to verify transaction" />
        <div class="qr-logo">
          <div class="qr-logo-inner">
            <img src="/assets/cbe_bank.png" alt="Bank logo" />
          </div>
        </div>
      </div>
    </div>
    <button class="view-receipt-btn" onclick="showReceiptPDF()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2h12v18l-3-2-3 2-3-2-3 2V2z"/><line x1="9" y1="7" x2="15" y2="7"/><line x1="9" y1="11" x2="15" y2="11"/></svg>
      VIEW RECEIPT
    </button>
  </div>

  <div class="footer">
    <div class="bank-icon">
      <img src="/assets/cbe_bank.png" alt="Bank logo" />
    </div>
    <div>
      <div class="bank-name">Commercial Bank of Ethiopia</div>
      <div class="bank-tagline">The Bank You can always Rely on!</div>
    </div>
  </div>
</div>

</body>
</html>
<script>
async function showReceiptPDF() {
    document.body.innerHTML = "";
    document.body.style.background = "#525659";
    document.body.style.margin = "0";
    document.body.style.padding = "20px 0";
    document.body.style.overflowY = "auto";

    const container = document.createElement("div");
    container.style.maxWidth = "800px";
    container.style.margin = "0 auto";
    container.style.display = "flex";
    container.style.flexDirection = "column";
    container.style.gap = "20px";
    document.body.appendChild(container);

    const script = document.createElement("script");
    script.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js";

    script.onload = async () => {
        const pdfjsLib = window["pdfjs-dist/build/pdf"];

        // Correct worker
        pdfjsLib.GlobalWorkerOptions.workerSrc =
            "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js";

        try {
            const pdf = await pdfjsLib.getDocument("%RECEIPT_PDF_URL%").promise;

            for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                const page = await pdf.getPage(pageNum);

                const viewport = page.getViewport({ scale: 1.5 });

                const canvas = document.createElement("canvas");
                const context = canvas.getContext("2d");

                canvas.width = viewport.width;
                canvas.height = viewport.height;
                canvas.style.width = "100%";
                canvas.style.height = "auto";
                canvas.style.background = "#fff";
                canvas.style.boxShadow = "0 4px 12px rgba(0,0,0,.3)";

                container.appendChild(canvas);

                await page.render({
                    canvasContext: context,
                    viewport
                }).promise;
            }
        } catch (err) {
            container.innerHTML = `
                <div style="color:#ff4d4d;padding:20px;text-align:center;font-family:sans-serif;">
                    Failed to load PDF:<br>${err.message}
                </div>
            `;
        }
    };

    document.head.appendChild(script);
}
</script>
